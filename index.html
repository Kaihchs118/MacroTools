    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2338bdf8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z'/%3E%3Cpath d='m3.3 7 8.7 5 8.7-5'/%3E%3Cpath d='M12 22v-9'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              surface: {
                950: 'rgb(var(--surface-950) / <alpha-value>)',
                900: 'rgb(var(--surface-900) / <alpha-value>)',
                800: 'rgb(var(--surface-800) / <alpha-value>)',
                700: 'rgb(var(--surface-700) / <alpha-value>)',
                600: 'rgb(var(--surface-600) / <alpha-value>)',
                500: 'rgb(var(--surface-500) / <alpha-value>)',
                400: 'rgb(var(--surface-400) / <alpha-value>)',
                300: 'rgb(var(--surface-300) / <alpha-value>)',
                200: 'rgb(var(--surface-200) / <alpha-value>)',
                100: 'rgb(var(--surface-100) / <alpha-value>)',
                50: 'rgb(var(--surface-50) / <alpha-value>)',
              },
              primary: {
                DEFAULT: 'rgb(var(--primary) / <alpha-value>)',
                hover: 'rgb(var(--primary-hover) / <alpha-value>)',
                active: 'rgb(var(--primary-active) / <alpha-value>)',
                glow: 'var(--primary-glow)'
              },
              accent: {
                DEFAULT: 'rgb(var(--accent) / <alpha-value>)',
                glow: 'var(--accent-glow)'
              }
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
              mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
            },
            boxShadow: {
              'glow': '0 0 20px -5px var(--tw-shadow-color)',
              'panel': '0 8px 32px -4px rgba(0, 0, 0, 0.3)',
              'glass': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* Dark Mode (Default) */
        --surface-950: 6 6 17;      /* #060611 Deepest */
        --surface-900: 12 18 33;    /* #0C1221 Background */
        --surface-800: 30 41 59;    /* #1e293b Panels */
        --surface-700: 51 65 85;    /* #334155 Borders */
        --surface-600: 71 85 105;   /* #475569 Muted */
        --surface-500: 100 116 139; /* #64748b Text */
        --surface-400: 148 163 184; /* #94a3b8 Light Text */
        --surface-300: 203 213 225; /* #cbd5e1 Lighter */
        --surface-200: 226 232 240; /* #e2e8f0 White-ish */
        --surface-100: 241 245 249; /* #f1f5f9 Bright */
        --surface-50:  248 250 252; /* #f8fafc Brightest */

        --primary: 56 189 248;        /* #38bdf8 Cyan 400 */
        --primary-hover: 14 165 233;  /* #0ea5e9 Cyan 500 */
        --primary-active: 2 132 199;  /* #0284c7 Cyan 600 */
        --primary-glow: rgba(56, 189, 248, 0.4);

        --accent: 139 92 246;         /* #8b5cf6 Violet */
        --accent-glow: rgba(139, 92, 246, 0.4);
        
        --glass-bg: rgba(30, 41, 59, 0.4);
        --glass-border: rgba(255, 255, 255, 0.05);
        --glass-input: rgba(15, 23, 42, 0.6);
        --glass-input-focus: rgba(15, 23, 42, 0.8);
      }

      [data-theme='light'] {
        /* Light Mode Inversion */
        --surface-950: 255 255 255; /* White Inputs */
        --surface-900: 236 242 255; /* Soft Blue BG (Blue 50-ish) */
        --surface-800: 255 255 255; /* White Panels */
        --surface-700: 203 213 225; /* #cbd5e1 (Slate 300) Borders */
        --surface-600: 148 163 184; /* #94a3b8 (Slate 400) Muted */
        
        /* Darkened for better contrast in light mode */
        --surface-500: 71 85 105;   /* #475569 (Slate 600) Text */
        --surface-400: 51 65 85;    /* #334155 (Slate 700) Darker Text */
        --surface-300: 30 41 59;    /* #1e293b (Slate 800) Headings */
        --surface-200: 15 23 42;    /* #0f172a (Slate 900) Darkest/Highlight */
        
        --surface-100: 15 23 42;    /* Slate 900 (Blackish) */
        --surface-50:  2 6 23;      /* Slate 950 (Blackest) */

        --primary: 2 132 199;         /* #0284c7 (Sky 600) darker for light bg */
        --primary-hover: 3 105 161;   /* #0369a1 (Sky 700) */
        --primary-active: 12 74 110;  /* #0c4a6e (Sky 900) */
        --primary-glow: rgba(2, 132, 199, 0.15);
        
        --glass-bg: rgba(255, 255, 255, 0.65);
        --glass-border: rgba(0, 0, 0, 0.08);
        --glass-input: rgba(245, 248, 252, 0.8);
        --glass-input-focus: rgba(255, 255, 255, 1);
      }

      body {
        background-color: rgb(var(--surface-900));
        color: rgb(var(--surface-400));
        min-height: 100vh;
        overflow-x: hidden;
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      /* Professional Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: rgb(var(--surface-700)); 
        border-radius: 2px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgb(var(--surface-600)); 
      }
      ::-webkit-scrollbar-corner {
        background: transparent;
      }
      
      .glass-panel {
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        transition: background 0.3s ease, border-color 0.3s ease;
      }
      
      .glass-input {
        background: var(--glass-input);
        border: 1px solid var(--glass-border);
        transition: all 0.2s ease;
      }
      .glass-input:focus {
        background: var(--glass-input-focus);
        border-color: rgb(var(--primary));
        box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.3);
      }
      
      [data-theme='light'] .glass-input:focus {
         box-shadow: 0 0 0 1px rgba(2, 132, 199, 0.2);
      }

      /* Hide scrollbar for specific containers */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
